# cargo-deny configuration — dependency advisory, license, and source policy.
# Run locally with `cargo deny check`; enforced in CI (the `advisories` job).
# See https://embarkstudios.github.io/cargo-deny/.

[advisories]
version = 2
yanked = "deny"
# RUSTSEC-2025-0134: rustls-pemfile is unmaintained. weir's own TLS loaders were
# migrated off it to rustls_pki_types::pem (S16), so this is now a TRANSITIVE-only
# dependency via mysql_async; it can only clear when mysql_async updates upstream.
# An explicit, documented exception, not a silent pass.
ignore = ["RUSTSEC-2025-0134"]

[licenses]
version = 2
# Permissive licenses the workspace and its dependency tree use. A new dependency
# under a license not listed here fails CI — surfacing the license decision rather
# than letting it slip in unreviewed.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "Unlicense",
    "0BSD",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
# Duplicate versions are a hygiene smell, not a hard failure — warn so they're
# visible without blocking releases on an unavoidable transitive diamond.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
