# weir monitoring stack — turnkey Prometheus + Grafana + weir + load generators.
#
#   cd deploy/monitoring
#   docker compose up --build                      # default: one weir, steady trickle
#   docker compose --profile levels up --build     # + min/med/high/max comparison
#   docker compose --profile chaos  up --build     # + dead-letter / peer-UID faults
#
# Then open Grafana at http://localhost:3000 (anonymous, the "weir — durable
# write buffer" dashboard is pre-loaded) and Prometheus at http://localhost:9090
# (Status → Rules shows the loaded alerts).
#
# Profiles (opt-in, heavier — services without a profile always run):
#   • levels — four extra weir instances driven at min/med/high/max load, scraped
#     as job=weir-levels with a per-instance `level` label. The dashboard's
#     "Usage levels" row compares them side by side.
#   • chaos  — a weir whose HTTP sink is permanently failing (→ dead-letter), with
#     peer-UID checking on and a root probe being rejected. Drives the
#     should-be-zero panels (dead-letter / sink-health / peer-UID) so you can see
#     them light up. Scraped as job=weir-chaos.
#
# This is an EXAMPLE you own: edit the dashboard in Grafana, tune the alert
# thresholds in ../prometheus/weir-alerts.yml, or point your existing
# Prometheus/Grafana at a real weir instead.

# ── Reusable bases (YAML anchors) ───────────────────────────────────────────────
x-weir-base: &weir-base
  build:
    context: ../..
    dockerfile: deploy/docker/Dockerfile
  image: weir-server:local
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "/bin/bash", "-c", "exec 3</dev/tcp/127.0.0.1/9185 || exit 1"]
    interval: 5s
    timeout: 3s
    retries: 5
    start_period: 5s

x-loadgen-base: &loadgen-base
  build:
    context: ../..
    dockerfile: deploy/monitoring/loadgen.Dockerfile
  image: weir-loadgen:local
  restart: unless-stopped

services:
  # ── Default single-instance demo (always on) ──────────────────────────────────
  weir:
    <<: *weir-base
    volumes:
      - weir_socket:/run/weir
      - wab_data:/var/lib/weir/wab
      - ./weir.toml:/etc/weir/weir.toml:ro
    environment:
      # Demo: accept the loadgen container regardless of its UID. In production
      # leave the peer-UID check on (the default) and run producers as the weir user.
      WEIR_PEER_UID_CHECK: "false"
      WEIR_LOG_LEVEL: info

  loadgen:
    <<: *loadgen-base
    depends_on:
      weir:
        condition: service_healthy
    volumes:
      - weir_socket:/run/weir
    environment:
      WEIR_SOCKET: /run/weir/weir.sock
      # No WEIR_LOAD_LEVEL → the original steady trickle (count=60, sleep=2).

  # ── `levels` profile: min/med/high/max side-by-side comparison ────────────────
  weir-min:
    <<: *weir-base
    profiles: ["levels"]
    volumes:
      - weir_min_socket:/run/weir
      - weir_min_wab:/var/lib/weir/wab
      - ./weir.toml:/etc/weir/weir.toml:ro
    environment:
      WEIR_PEER_UID_CHECK: "false"
      WEIR_LOG_LEVEL: info
  loadgen-min:
    <<: *loadgen-base
    profiles: ["levels"]
    depends_on:
      weir-min:
        condition: service_healthy
    volumes:
      - weir_min_socket:/run/weir
    environment:
      WEIR_SOCKET: /run/weir/weir.sock
      WEIR_LOAD_LEVEL: min

  weir-med:
    <<: *weir-base
    profiles: ["levels"]
    volumes:
      - weir_med_socket:/run/weir
      - weir_med_wab:/var/lib/weir/wab
      - ./weir.toml:/etc/weir/weir.toml:ro
    environment:
      WEIR_PEER_UID_CHECK: "false"
      WEIR_LOG_LEVEL: info
  loadgen-med:
    <<: *loadgen-base
    profiles: ["levels"]
    depends_on:
      weir-med:
        condition: service_healthy
    volumes:
      - weir_med_socket:/run/weir
    environment:
      WEIR_SOCKET: /run/weir/weir.sock
      WEIR_LOAD_LEVEL: med

  weir-high:
    <<: *weir-base
    profiles: ["levels"]
    volumes:
      - weir_high_socket:/run/weir
      - weir_high_wab:/var/lib/weir/wab
      - ./weir.toml:/etc/weir/weir.toml:ro
    environment:
      WEIR_PEER_UID_CHECK: "false"
      WEIR_LOG_LEVEL: info
  loadgen-high:
    <<: *loadgen-base
    profiles: ["levels"]
    depends_on:
      weir-high:
        condition: service_healthy
    volumes:
      - weir_high_socket:/run/weir
    environment:
      WEIR_SOCKET: /run/weir/weir.sock
      WEIR_LOAD_LEVEL: high

  weir-max:
    <<: *weir-base
    profiles: ["levels"]
    volumes:
      - weir_max_socket:/run/weir
      - weir_max_wab:/var/lib/weir/wab
      - ./weir.toml:/etc/weir/weir.toml:ro
    environment:
      WEIR_PEER_UID_CHECK: "false"
      WEIR_LOG_LEVEL: info
  loadgen-max:
    <<: *loadgen-base
    profiles: ["levels"]
    depends_on:
      weir-max:
        condition: service_healthy
    volumes:
      - weir_max_socket:/run/weir
    environment:
      WEIR_SOCKET: /run/weir/weir.sock
      WEIR_LOAD_LEVEL: max

  # ── `chaos` profile: drive the should-be-zero panels ──────────────────────────
  failmock:
    # Permanently rejects every POST with HTTP 400 (a permanent status → weir
    # dead-letters instead of retrying). See chaos-failmock.conf.
    image: nginx:alpine
    profiles: ["chaos"]
    restart: unless-stopped
    volumes:
      - ./chaos-failmock.conf:/etc/nginx/conf.d/default.conf:ro

  weir-chaos:
    <<: *weir-base
    profiles: ["chaos"]
    depends_on:
      - failmock
    volumes:
      - weir_chaos_socket:/run/weir
      - weir_chaos_wab:/var/lib/weir/wab
      - ./weir-chaos.toml:/etc/weir/weir.toml:ro
    environment:
      # peer-UID check ON: the root probe is refused, the uid-10001 loadgen is not.
      WEIR_PEER_UID_CHECK: "true"
      WEIR_LOG_LEVEL: info

  chaos-loadgen:
    <<: *loadgen-base
    profiles: ["chaos"]
    # Match weir-chaos's uid (10001) so the peer-UID check accepts this producer.
    user: "10001:10001"
    depends_on:
      weir-chaos:
        condition: service_healthy
    volumes:
      - weir_chaos_socket:/run/weir
    environment:
      WEIR_SOCKET: /run/weir/weir.sock
      WEIR_LOAD_LEVEL: high

  chaos-probe:
    <<: *loadgen-base
    profiles: ["chaos"]
    # Runs as root (uid 0, the image default) → peer-UID mismatch → rejected.
    entrypoint: ["/usr/local/bin/chaos-probe.sh"]
    depends_on:
      weir-chaos:
        condition: service_healthy
    volumes:
      - weir_chaos_socket:/run/weir
    environment:
      WEIR_SOCKET: /run/weir/weir.sock

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    depends_on:
      - weir
    ports:
      - "127.0.0.1:9090:9090"
    # --web.enable-lifecycle exposes POST /-/reload so a config change (e.g.
    # adding the levels/chaos scrape jobs) can be applied without recreating the
    # container — the smoke test and `--profile` switches rely on it. The rest of
    # the args are the image defaults, which an explicit `command` would override.
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/weir-alerts.yml:/etc/prometheus/weir-alerts.yml:ro

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # The overview + the generated per-instance dashboards (weir-min/med/high/
      # max/chaos). The provider scans /var/lib/grafana/dashboards recursively, so
      # both the file and the levels/ subdir are picked up as separate dashboards.
      - ../grafana/weir-dashboard.json:/var/lib/grafana/dashboards/weir-dashboard.json:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards/levels:ro

volumes:
  weir_socket: { driver: local }
  wab_data: { driver: local }
  # levels profile
  weir_min_socket: { driver: local }
  weir_min_wab: { driver: local }
  weir_med_socket: { driver: local }
  weir_med_wab: { driver: local }
  weir_high_socket: { driver: local }
  weir_high_wab: { driver: local }
  weir_max_socket: { driver: local }
  weir_max_wab: { driver: local }
  # chaos profile
  weir_chaos_socket: { driver: local }
  weir_chaos_wab: { driver: local }
