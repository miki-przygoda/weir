# failmock — a stand-in downstream that permanently rejects everything.
#
# weir's HTTP sink POSTs one record per request; this returns 400 to every
# request (and every method, so the sink's HEAD health probe also sees 400 →
# Degraded). 400 is a PERMANENT status in weir's classifier (4xx except
# 408/429), so records are dead-lettered rather than retried — which is exactly
# the behaviour the chaos profile demonstrates. A 5xx would be transient and
# loop forever instead, so it must be a 4xx.
server {
    listen 80 default_server;
    server_name _;

    location / {
        return 400 "chaos failmock: permanent rejection — weir should dead-letter this\n";
    }
}
