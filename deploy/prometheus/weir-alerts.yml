# weir — Prometheus alert rules
#
# Load via prometheus.yml:
#   rule_files:
#     - /etc/prometheus/weir-alerts.yml
#
# Validate:  promtool check rules weir-alerts.yml
#
# Thresholds marked [TUNE] depend on your storage + workload. The durability
# group is page-worthy; the rest are warnings. Per-alert remediation is in
# docs/monitoring.md (the `runbook` annotation links each one).
#
# Selectors assume a `job="weir"` scrape target — adjust `job=~"weir"` to match
# your Prometheus scrape_config job name.

groups:
  # ── Durability — page-worthy ────────────────────────────────────────────────
  - name: weir-durability
    rules:
      - alert: WeirInstanceDown
        expr: up{job=~"weir"} == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "weir instance {{ $labels.instance }} is down"
          description: "Prometheus cannot scrape weir's /metrics. The daemon is unreachable or dead — producers are likely failing to connect."
          runbook: "docs/monitoring.md#weirinstancedown"

      - alert: WeirFsyncFailure
        expr: increase(weir_wab_fsync_failures_total{job=~"weir"}[5m]) > 0
        for: 0m
        labels: { severity: critical }
        annotations:
          summary: "weir fsync FAILED on {{ $labels.instance }} — durability hazard"
          description: "fdatasync returned an error: a record could not be guaranteed on stable storage. The producer was Nacked (no false ack — DST-verified), so no data was silently lost, but the disk/filesystem needs investigation."
          runbook: "docs/monitoring.md#weirfsyncfailure"

      - alert: WeirFlusherPanic
        expr: increase(weir_wab_flusher_panics_total{job=~"weir"}[5m]) > 0
        for: 0m
        labels: { severity: critical }
        annotations:
          summary: "weir WAB flusher panicked on {{ $labels.instance }}"
          description: "A flusher thread panicked. The supervisor respawns it up to 10× (linear backoff) then takes the shard permanently offline (Nack-everything until restart). Repeated panics = a logical bug; capture the panic log."
          runbook: "docs/monitoring.md#weirflusherpanic"

      - alert: WeirAckTimeout
        expr: increase(weir_ack_timeout_total{job=~"weir"}[5m]) > 0
        for: 0m
        labels: { severity: critical }
        annotations:
          summary: "weir ack timed out on {{ $labels.instance }} — flusher may be wedged"
          description: "A record's ack never fired within the timeout without a panic — the classic wedged-flusher signature (e.g. a stuck fsync). Check fsync latency and the flusher threads."
          runbook: "docs/monitoring.md#weiracktimeout"

      - alert: WeirSegmentQuarantined
        expr: increase(weir_recovery_segments_quarantined_total{job=~"weir"}[10m]) > 0
        for: 0m
        labels: { severity: critical }
        annotations:
          summary: "weir quarantined a corrupt segment on {{ $labels.instance }}"
          description: "Crash recovery found a segment with bad magic, an unknown format version, or a CRC mismatch and moved it to the quarantine directory. Data-integrity event — inspect the quarantined file."
          runbook: "docs/monitoring.md#weirsegmentquarantined"

      - alert: WeirFsyncLatencyHigh
        # [TUNE] 20ms is well above the measured baselines (NVMe p99.9 ~2.4ms,
        # SATA SSD ~6ms). Set to ~3-4× your medium's measured p99.9.
        expr: histogram_quantile(0.999, sum by (le, instance) (rate(weir_wab_fsync_duration_seconds_bucket{job=~"weir"}[5m]))) > 0.02
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "weir fsync p99.9 high on {{ $labels.instance }} ({{ $value | humanizeDuration }})"
          description: "Sustained fsync latency above the storage baseline. weir is fsync-bound, so this directly caps durable throughput. Check storage contention, a failing disk, or network-attached storage (NFS/EFS make fdatasync 5-50× slower)."
          runbook: "docs/monitoring.md#weirfsynclatency"

      - alert: WeirFsyncLatencyCritical
        # [TUNE] 100ms p99.9 indicates serious storage trouble for any local SSD.
        expr: histogram_quantile(0.999, sum by (le, instance) (rate(weir_wab_fsync_duration_seconds_bucket{job=~"weir"}[5m]))) > 0.1
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "weir fsync p99.9 CRITICAL on {{ $labels.instance }} ({{ $value | humanizeDuration }})"
          description: "fsync latency is an order of magnitude above any healthy local SSD. Durable-tier throughput is collapsing. Likely a failing disk or saturated/remote storage."
          runbook: "docs/monitoring.md#weirfsynclatency"

  # ── Drain / dead-letter ─────────────────────────────────────────────────────
  - name: weir-drain
    rules:
      - alert: WeirDrainBlocked
        expr: weir_drain_state{job=~"weir", state="blocked_dead_letter_full"} == 1
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "weir drain BLOCKED on {{ $labels.instance }} — dead-letter dir full"
          description: "The dead-letter directory hit its cap; ALL drain activity is paused and the WAB will accumulate on disk. Free dead-letter space or raise dead_letter_max_bytes, then the drain resumes automatically."
          runbook: "docs/monitoring.md#weirdrainblocked"

      - alert: WeirSinkDown
        expr: min by (instance) (weir_sink_health{job=~"weir"}) == 0
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "weir sink reporting unhealthy on {{ $labels.instance }}"
          description: "The configured sink reports itself unhealthy. The WAB keeps buffering durably (no data loss), but delivery is stalled. Check the downstream system."
          runbook: "docs/monitoring.md#weirsinkdown"

      - alert: WeirSegmentStranded
        expr: increase(weir_drain_segments_stranded_total{job=~"weir"}[15m]) > 0
        for: 0m
        labels: { severity: critical }
        annotations:
          summary: "weir stranded a WAB segment on {{ $labels.instance }} — delivery stalled"
          description: "The drain exhausted max_retries of TRANSIENT sink failures on a segment and abandoned it on disk; it is only re-attempted on daemon restart. The data is durable (no loss), but delivery for that segment has stopped. Fix the sink (correlate with WeirSinkDown), then restart the daemon to replay the stranded segment."
          runbook: "docs/monitoring.md#weirsegmentstranded"

      - alert: WeirDeadLettered
        expr: increase(weir_sink_commit_records_total{job=~"weir", outcome="dead_lettered"}[15m]) > 0
        for: 0m
        labels: { severity: warning }
        annotations:
          summary: "weir is dead-lettering records on {{ $labels.instance }}"
          description: "The sink permanently rejected records (e.g. a 4xx). They are written to the dead-letter directory for manual handling, not retried. Inspect the dead-letter files + the sink's rejection reason."
          runbook: "docs/monitoring.md#weirdeadlettered"

  # ── Ingest / backpressure ───────────────────────────────────────────────────
  - name: weir-ingest
    rules:
      - alert: WeirHighNackRate
        expr: sum by (instance) (rate(weir_records_nack_total{job=~"weir"}[5m])) > 0
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "weir is Nacking records on {{ $labels.instance }}"
          description: "Producers are being told records were NOT accepted durably. Causes: a shard taken offline by repeated flusher panics, fsync failures, or sustained backpressure. At-least-once means producers should retry — but a sustained rate needs investigation."
          runbook: "docs/monitoring.md#weirhighnackrate"

      - alert: WeirQueueSaturation
        # [TUNE] depends on batch_size × shard_count and expected burst depth.
        expr: max by (instance) (weir_queue_depth{job=~"weir"}) > 50000
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "weir queue depth sustained high on {{ $labels.instance }} ({{ $value }})"
          description: "The work queue is backing up — the WAB flushers can't keep pace with ingest (usually storage pressure). Correlate with fsync latency. Producers see backpressure (slower acks)."
          runbook: "docs/monitoring.md#weirqueuesaturation"

  # ── Security / connection ───────────────────────────────────────────────────
  - name: weir-security
    rules:
      - alert: WeirUnauthorizedConnections
        expr: increase(weir_connection_rejected_peer_uid_total{job=~"weir"}[5m]) > 0
        for: 0m
        labels: { severity: warning }
        annotations:
          summary: "weir rejected connections by peer-UID on {{ $labels.instance }}"
          description: "A process whose UID is not allowed tried to connect over the Unix socket and was rejected by the SO_PEERCRED check. Either a misconfigured producer (wrong user) or an unauthorized client."
          runbook: "docs/monitoring.md#weirunauthorizedconnections"

      - alert: WeirTlsHandshakeFailures
        # [TUNE] a few transient failures are normal; >5/5m suggests a real issue.
        expr: increase(weir_tls_handshake_failures_total{job=~"weir"}[5m]) > 5
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "weir TLS handshake failures on {{ $labels.instance }}"
          description: "(tls feature) Repeated mutual-TLS handshake failures — client-cert expiry/rotation, a CA mismatch, or a probe hitting the TCP port. Check the client certificates and the CA bundle."
          runbook: "docs/monitoring.md#weirtlshandshakefailures"
