[package]
name = "weir-server"
description = "The weir daemon"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "weir-server"
path = "src/main.rs"

[dependencies]
weir-core = { path = "../weir-core" }
crc32fast = "1.4"
crossbeam-channel = "0.5"
tokio = { version = "1", features = ["sync"] }
tracing = "0.1"
libc = "0.2"
core_affinity = "0.8"

[dev-dependencies]
# tempfile is not added: tests use std::env::temp_dir() with unique subpaths.
