[package]
name = "weir-server"
description = "The weir daemon"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "weir-server"
path = "src/main.rs"

[dependencies]
weir-core = { path = "../weir-core" }
crc32fast = "1.4"
crossbeam-channel = "0.5"
tokio = { version = "1", features = [
    "net",
    "sync",
    "rt-multi-thread",
    "macros",
    "time",
    "io-util",
    "signal",
] }
tracing = "0.1"
libc = "0.2"
core_affinity = "0.8"
prometheus-client = "0.22"
pico-args = "0.5"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
# tempfile is not added: tests use std::env::temp_dir() with unique subpaths.
