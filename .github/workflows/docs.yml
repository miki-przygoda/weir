name: Publish docs

# Build the mdBook from docs/ and publish to GitHub Pages on every
# push to main. PRs build but do not publish, so doc breakage is
# caught in review.

on:
  # Manual trigger: Actions → "Publish docs" → "Run workflow". Lets an
  # operator deploy the site on demand (e.g. after enabling Pages, or when
  # a main push didn't touch a watched path so the deploy didn't auto-fire).
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "book.toml"
      - "README.md"
      - "SECURITY.md"
      - "CHANGELOG.md"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "book.toml"
      - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight publish at a time; cancel older runs.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "0.4.40"

      # mdbook-linkcheck validates internal markdown cross-references and
      # anchor fragments on every build. follow-web-links = false in book.toml
      # keeps it offline; broken `.md` links or anchors fail the build.
      - name: Install mdbook-linkcheck
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://github.com/Michael-F-Bryan/mdbook-linkcheck/releases/download/v0.7.7/mdbook-linkcheck.x86_64-unknown-linux-gnu.zip -o /tmp/linkcheck.zip
          unzip -o /tmp/linkcheck.zip -d "$HOME/.local/bin"
          chmod +x "$HOME/.local/bin/mdbook-linkcheck"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build book (with link checking)
        run: mdbook build

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
