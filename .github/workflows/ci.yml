name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  load:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build test binary
        run: cargo test -p weir-server --test load --no-run
      - name: Run load tests (5 × 1ms deadline, 5 × 2ms deadline)
        run: |
          for deadline in 1 2; do
            for i in 1 2 3 4 5; do
              echo "--- deadline=${deadline}ms run $i ---"
              WEIR_BENCH_DEADLINE=$deadline \
                cargo test -p weir-server --test load --release -- --nocapture 2>/dev/null \
                | grep '^BENCH: ' >> load_results.jsonl || true
            done
          done
      - name: Extract version
        run: |
          echo "WEIR_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')" >> "$GITHUB_ENV"
      - name: Average results and update benchmarks
        run: |
          python3 deploy/avg_benchmarks.py \
            load_results.jsonl \
            docs/benchmarks/latest.md \
            docs/benchmarks/history.md
      - name: Show benchmark summary
        run: cat docs/benchmarks/latest.md
      - name: Commit benchmark results
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/benchmarks/latest.md docs/benchmarks/history.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: update benchmark baselines [skip ci]"
            git push
          fi

  bench:
    name: bench (tests/load)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run bench (tests/load)
        # tests/load.rs spawns its own weir-server, runs every benchmark
        # scenario, and emits the same `BENCH:` JSONL format that
        # avg_benchmarks.py consumes — so the renderer below is unchanged.
        # Three trials per deadline to average out single-run noise.
        run: |
          set -euo pipefail
          for run in 1 2 3; do
            echo "--- bench run $run ---"
            WEIR_BENCH_DEADLINE=1 \
              cargo test --release -p weir-server --test load -- --nocapture 2>/dev/null \
              | grep '^BENCH: ' \
              >> bench_results.jsonl
          done

      - name: Show bench results
        run: |
          echo "=== raw BENCH lines ==="
          grep '^BENCH: ' bench_results.jsonl || true

      - name: Average results
        run: |
          python3 deploy/avg_benchmarks.py \
            bench_results.jsonl \
            docs/benchmarks/bench-latest.md
          cat docs/benchmarks/bench-latest.md

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          # Windows tar.exe intermittently fails to save the cache; skip the
          # post-run save step to prevent a flaky infrastructure error from
          # failing the build job.
          save-if: ${{ matrix.os != 'windows-latest' }}
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p weir-server
          else
            cargo build --release --target ${{ matrix.target }} -p weir-server
          fi
      - name: Stage binary (Unix)
        if: matrix.target != 'x86_64-pc-windows-msvc'
        shell: bash
        run: mv target/${{ matrix.target }}/release/weir-server weir-server-${{ matrix.target }}
      - name: Stage binary (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: mv target/${{ matrix.target }}/release/weir-server.exe weir-server-${{ matrix.target }}.exe
      - uses: actions/upload-artifact@v4
        with:
          name: weir-server-${{ matrix.target }}
          path: weir-server-${{ matrix.target }}*
          retention-days: 7
